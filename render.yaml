# Exported from Render on 2026-04-12T04:01:48Z — updated 2026-04-13
version: "1"
services:

# ── Static landing page ──────────────────────────────────────────────────────
- type: web
  name: neolabcare
  runtime: static
  repo: https://github.com/lareesahu/neolab-landing
  branch: master
  autoDeploy: true
  staticPublishPath: .

# ── Feedback webhook (Python) ────────────────────────────────────────────────
# Receives form submissions, logs to Google Sheets, forwards to Web3Forms
- type: web
  name: neolabcare-webhook
  runtime: python
  repo: https://github.com/lareesahu/neolab-landing
  branch: master
  autoDeploy: true
  rootDir: webhook
  buildCommand: pip install -r requirements.txt
  startCommand: python server.py
  envVars:
  - key: SHEET_ID
    value: 1sBoEdScXkdI4mzO422qB1viAqnuemh7XeRJDuOF8ZnA
  - key: WEB3FORMS_KEY
    value: fe35df41-5c1c-4519-9513-f9a227fcffe4
  - key: GOOGLE_SA_KEY
    sync: false   # Set manually in Render dashboard — paste the full service account JSON
  - key: APPROVAL_SECRET
    sync: false   # Set manually — any long random string (used to sign creator approval tokens)
  - key: WEBHOOK_BASE_URL
    value: https://neolabcare-webhook.onrender.com
  - key: FOUNDER_EMAIL
    value: lareesa@neolab.care
  - key: SHOPIFY_STORE
    sync: false   # Set when ready — e.g. neolab-care.myshopify.com
  - key: SHOPIFY_ADMIN_TOKEN
    sync: false   # Set when ready — shpat_... (enables auto discount code creation)
  - key: SHOPIFY_WEBHOOK_SECRET
    sync: false   # Set when ready — from Shopify webhook settings (validates order events)
