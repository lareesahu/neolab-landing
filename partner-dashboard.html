<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #f5f5f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #c8b89a;
            text-align: center;
            margin-bottom: 30px;
        }
        p {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .button-group {
            text-align: center;
            margin-top: 30px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #c8b89a;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #b0a080;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partner Dashboard</h1>
        <p>Welcome to your Partner Dashboard. Here you will be able to track your referrals, earnings, and other important metrics related to your partnership with NeolabCare.</p>
        <p>This page is currently under construction. Please check back soon for updates!</p>
        <div class="button-group">
            <a href="index.html" class="button">Back to Homepage</a>
        </div>
    </div>
</body>
</html>
